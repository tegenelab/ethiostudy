<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#6366f1" opacity="0.08"/>
  <circle cx="1100" cy="530" r="250" fill="#0d9488" opacity="0.08"/>
  
  <!-- Logo -->
  <g transform="translate(80, 230)">
    <rect width="80" height="80" rx="18" fill="url(#accent)"/>
    <g transform="translate(16, 14)">
      <path d="M24 4 C16 4 8 7 4 12 L4 52 C8 47 16 44 24 44 C32 44 40 47 44 52 L44 12 C40 7 32 4 24 4Z" fill="white" opacity="0.95"/>
      <path d="M24 4 L24 44" stroke="#6366f1" stroke-width="1.5" fill="none"/>
      <path d="M10 17 L18 15 L18 40 L10 42Z" fill="#e0e7ff"/>
      <path d="M30 15 L38 17 L38 42 L30 40Z" fill="#ccfbf1"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="190" y="290" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white">EthioStudy</text>
  
  <!-- Subtitle -->
  <text x="190" y="340" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">Free Textbooks &amp; Study Resources for Ethiopian Students</text>
  
  <!-- Tags -->
  <g transform="translate(190, 370)">
    <rect width="120" height="32" rx="8" fill="#6366f1" opacity="0.2"/>
    <text x="60" y="21" font-family="Arial, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle">Grades 9-12</text>
    
    <rect x="136" width="100" height="32" rx="8" fill="#0d9488" opacity="0.2"/>
    <text x="186" y="21" font-family="Arial, sans-serif" font-size="13" fill="#5eead4" text-anchor="middle">PDF Books</text>
    
    <rect x="252" width="130" height="32" rx="8" fill="#f59e0b" opacity="0.2"/>
    <text x="317" y="21" font-family="Arial, sans-serif" font-size="13" fill="#fcd34d" text-anchor="middle">Study Roadmap</text>
  </g>
  
  <!-- URL -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">ethiostudy.com</text>
